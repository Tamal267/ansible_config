- hosts: all
  become: yes
  vars:
    username: contest
  tasks:
    - name: Ensure /etc/skel/.config directory exists
      file:
        path: /etc/skel/.config
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Copy .config folder (Code, codeblocks) to /etc/skel/.config
      copy:
        src: config/.config/
        dest: /etc/skel/.config/
        owner: root
        group: root
        mode: '0644'
        directory_mode: '0755'

    - name: Copy .vimrc to /etc/skel
      copy:
        src: config/.vimrc
        dest: /etc/skel/.vimrc
        owner: root
        group: root
        mode: '0644'

    - name: Create user '{{ username }}' with bash shell and home directory
      user:
        name: "{{ username }}"
        shell: /bin/bash
        create_home: yes
        skeleton: /etc/skel
        password: '$6$ChbgMGoNGgFVFMem$3YOit.TTj.1fZpO8CX2Fh5rhrp8OLG21AsmQiA/3f2gqLVOs2eXQeAluyuVFoUIvWcNGhE.GbuMQ.W3/KzWBJ1'
        state: present

    - name: Ensure /home/{{ username }}/.config directory exists
      file:
        path: "/home/{{ username }}/.config"
        state: directory
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: '0755'

    - name: Copy .config folder to {{ username }} user (overwrite existing)
      copy:
        src: config/.config/
        dest: "/home/{{ username }}/.config/"
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: '0644'
        directory_mode: '0755'

    - name: Copy .vimrc to {{ username }} user (overwrite existing)
      copy:
        src: config/.vimrc
        dest: "/home/{{ username }}/.vimrc"
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: '0644'
