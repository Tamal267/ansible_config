- hosts: all
  become: yes
  tasks:
    - name: Ensure ffmpeg is installed for video creation
      package:
        name: ffmpeg
        state: present

    - name: Stop screenshot-daemon systemd service
      systemd:
        name: screenshot-daemon
        state: stopped
        enabled: no
      failed_when: false

    - name: Copy stop_screenshot script
      copy:
        src: stop_screenshot.sh
        dest: /usr/local/bin/stop_screenshot.sh
        mode: '0755'

    - name: Run stop_screenshot script (generate MP4 video)
      command: /usr/local/bin/stop_screenshot.sh
