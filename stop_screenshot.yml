- hosts: all
  become: yes
  tasks:
    - name: Ensure ffmpeg is installed for video creation
      package:
        name: ffmpeg
        state: present

    - name: Copy stop_screenshot script to protected system path
      copy:
        src: stop_screenshot.sh
        dest: /usr/local/bin/stop_screenshot.sh
        mode: '0755'

    - name: Run stop_screenshot script
      command: /usr/local/bin/stop_screenshot.sh
